services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: annam_qa
      POSTGRES_USER: annam
      POSTGRES_PASSWORD: annam_secure_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5433"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://annam:annam_secure_pass@db:5432/annam_qa
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
